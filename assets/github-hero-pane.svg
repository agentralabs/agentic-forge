<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 360" role="img" aria-label="AgenticForge GitHub hero pane">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#b8b6ae"/>
    </pattern>
  </defs>
  <rect width="1400" height="360" fill="#f2f1ea"/>
  <rect width="1400" height="360" fill="url(#grid)"/>
  <rect x="20" y="20" width="1360" height="320" fill="none" stroke="#111111" stroke-width="2"/>

  <line x1="20" y1="62" x2="1380" y2="62" stroke="#111111" stroke-width="2"/>
  <text x="40" y="48" font-family="'JetBrains Mono', monospace" font-size="14" fill="#5f5c53" letter-spacing="2"> // AGENTRA_LABS: MODULE_HERO</text>
  <rect x="1318" y="36" width="8" height="8" fill="#ea580c"/>
  <text x="1336" y="48" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" letter-spacing="2">001</text>

  <!-- Tier stack panel -->
  <rect x="46" y="92" width="232" height="232" fill="none" stroke="#111111" stroke-width="2"/>
  <rect x="46" y="92" width="232" height="38" fill="#111111"/>
  <text x="62" y="116" font-family="'JetBrains Mono', monospace" font-size="11" fill="#f2f1ea" letter-spacing="2">FORGE.TIER_STACK</text>

  <!-- Tier stack visualization -->
  <rect x="66" y="148" width="192" height="18" fill="none" stroke="#ea580c" stroke-width="2"/>
  <text x="72" y="161" font-family="'JetBrains Mono', monospace" font-size="9" fill="#ea580c">T1: DECOMPOSITION</text>
  <rect x="66" y="172" width="192" height="18" fill="none" stroke="#111111" stroke-width="2"/>
  <text x="72" y="185" font-family="'JetBrains Mono', monospace" font-size="9" fill="#111111">T2: ENTITY_INFERENCE</text>
  <rect x="66" y="196" width="192" height="18" fill="none" stroke="#111111" stroke-width="2"/>
  <text x="72" y="209" font-family="'JetBrains Mono', monospace" font-size="9" fill="#111111">T3: STRUCTURE_GEN</text>
  <rect x="66" y="220" width="192" height="18" fill="none" stroke="#111111" stroke-width="2"/>
  <text x="72" y="233" font-family="'JetBrains Mono', monospace" font-size="9" fill="#5f5c53">T4: DEPENDENCY_MAP</text>
  <rect x="66" y="244" width="192" height="18" fill="none" stroke="#b8b6ae" stroke-width="2"/>
  <text x="72" y="257" font-family="'JetBrains Mono', monospace" font-size="9" fill="#5f5c53">T5: VALIDATION</text>
  <rect x="66" y="268" width="192" height="18" fill="none" stroke="#b8b6ae" stroke-width="1"/>
  <text x="72" y="281" font-family="'JetBrains Mono', monospace" font-size="9" fill="#b8b6ae">T6: OPTIMIZATION</text>
  <rect x="66" y="292" width="192" height="18" fill="none" stroke="#b8b6ae" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="72" y="305" font-family="'JetBrains Mono', monospace" font-size="9" fill="#b8b6ae">T7: EMISSION</text>

  <!-- Main title area -->
  <text x="324" y="136" font-family="'JetBrains Mono', monospace" font-size="54" fill="#111111" font-weight="700" letter-spacing="1">AGENTICFORGE</text>
  <text x="324" y="172" font-family="'JetBrains Mono', monospace" font-size="18" fill="#ea580c" font-weight="700" letter-spacing="2">BLUEPRINT ENGINE</text>
  <text x="324" y="210" font-family="'JetBrains Mono', monospace" font-size="16" fill="#5f5c53">
    Blueprint generation. Entity inference. Structure compilation. One engine turns
  </text>
  <text x="324" y="234" font-family="'JetBrains Mono', monospace" font-size="16" fill="#5f5c53">
    intent into architecture through 8 invention tiers.
  </text>

  <!-- Badges -->
  <rect x="324" y="258" width="186" height="34" fill="#111111"/>
  <text x="344" y="280" font-family="'JetBrains Mono', monospace" font-size="12" fill="#f2f1ea" letter-spacing="2">32-INVENTIONS</text>
  <rect x="520" y="258" width="162" height="34" fill="#111111"/>
  <text x="540" y="280" font-family="'JetBrains Mono', monospace" font-size="12" fill="#f2f1ea" letter-spacing="2">15-MCP-TOOLS</text>
  <rect x="692" y="258" width="132" height="34" fill="#111111"/>
  <text x="712" y="280" font-family="'JetBrains Mono', monospace" font-size="12" fill="#f2f1ea" letter-spacing="2">519-TESTS</text>
  <rect x="834" y="258" width="116" height="34" fill="#ea580c"/>
  <text x="858" y="280" font-family="'JetBrains Mono', monospace" font-size="12" fill="#f2f1ea" letter-spacing="2">.FORGE</text>
</svg>
