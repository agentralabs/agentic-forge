<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 360" role="img" aria-label="AgenticForge terminal pane">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#b8b6ae"/>
    </pattern>
  </defs>
  <rect width="1400" height="360" fill="#f2f1ea"/>
  <rect width="1400" height="360" fill="url(#grid)"/>
  <rect x="20" y="20" width="1360" height="320" fill="none" stroke="#111111" stroke-width="2"/>

  <line x1="20" y1="62" x2="1380" y2="62" stroke="#111111" stroke-width="2"/>
  <text x="40" y="48" font-family="'JetBrains Mono', monospace" font-size="14" fill="#5f5c53" letter-spacing="2"> // AGENTRA_LABS: QUICKSTART</text>
  <rect x="1318" y="36" width="8" height="8" fill="#ea580c"/>
  <text x="1336" y="48" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" letter-spacing="2">002</text>

  <!-- Terminal panel left -->
  <rect x="46" y="84" width="660" height="244" fill="none" stroke="#111111" stroke-width="2"/>
  <rect x="46" y="84" width="660" height="30" fill="#111111"/>
  <text x="62" y="104" font-family="'JetBrains Mono', monospace" font-size="11" fill="#f2f1ea" letter-spacing="2">INSTALL + BLUEPRINT</text>

  <text x="62" y="134" font-family="'JetBrains Mono', monospace" font-size="13" fill="#ea580c">$</text>
  <text x="78" y="134" font-family="'JetBrains Mono', monospace" font-size="13" fill="#111111"> cargo install agentic-forge-cli</text>
  <text x="62" y="156" font-family="'JetBrains Mono', monospace" font-size="13" fill="#5f5c53">  Installed aforge to ~/.cargo/bin/aforge</text>

  <text x="62" y="182" font-family="'JetBrains Mono', monospace" font-size="13" fill="#ea580c">$</text>
  <text x="78" y="182" font-family="'JetBrains Mono', monospace" font-size="13" fill="#111111"> aforge blueprint create --intent "REST API for users"</text>
  <text x="62" y="202" font-family="'JetBrains Mono', monospace" font-size="13" fill="#5f5c53">  Blueprint: bp-7e3a... (6 entities, 14 endpoints)</text>
  <text x="62" y="220" font-family="'JetBrains Mono', monospace" font-size="13" fill="#5f5c53">  Tiers resolved: T1..T7 in 0.8ms</text>

  <text x="62" y="246" font-family="'JetBrains Mono', monospace" font-size="13" fill="#ea580c">$</text>
  <text x="78" y="246" font-family="'JetBrains Mono', monospace" font-size="13" fill="#111111"> aforge entity infer --blueprint bp-7e3a</text>
  <text x="62" y="266" font-family="'JetBrains Mono', monospace" font-size="13" fill="#5f5c53">  Inferred: User, Role, Session, Token, Permission, AuditLog</text>
  <text x="62" y="284" font-family="'JetBrains Mono', monospace" font-size="13" fill="#5f5c53">  Relations: 8 edges  Confidence: 0.96</text>

  <!-- Terminal panel right -->
  <rect x="726" y="84" width="654" height="244" fill="none" stroke="#111111" stroke-width="2"/>
  <rect x="726" y="84" width="654" height="30" fill="#111111"/>
  <text x="742" y="104" font-family="'JetBrains Mono', monospace" font-size="11" fill="#f2f1ea" letter-spacing="2">STRUCTURE + TEST</text>

  <text x="742" y="134" font-family="'JetBrains Mono', monospace" font-size="13" fill="#ea580c">$</text>
  <text x="758" y="134" font-family="'JetBrains Mono', monospace" font-size="13" fill="#111111"> aforge structure generate --blueprint bp-7e3a</text>
  <text x="742" y="154" font-family="'JetBrains Mono', monospace" font-size="13" fill="#5f5c53">  Generated: 6 modules, 14 handlers, 8 migrations</text>
  <text x="742" y="172" font-family="'JetBrains Mono', monospace" font-size="13" fill="#5f5c53">  Output: ./forge-output/bp-7e3a/</text>

  <text x="742" y="198" font-family="'JetBrains Mono', monospace" font-size="13" fill="#ea580c">$</text>
  <text x="758" y="198" font-family="'JetBrains Mono', monospace" font-size="13" fill="#111111"> aforge test generate --blueprint bp-7e3a</text>
  <text x="742" y="218" font-family="'JetBrains Mono', monospace" font-size="13" fill="#5f5c53">  Tests: 42 unit, 12 integration, 6 property</text>
  <text x="742" y="236" font-family="'JetBrains Mono', monospace" font-size="13" fill="#ea580c">  Coverage target: 94%</text>

  <text x="742" y="262" font-family="'JetBrains Mono', monospace" font-size="13" fill="#ea580c">$</text>
  <text x="758" y="262" font-family="'JetBrains Mono', monospace" font-size="13" fill="#111111"> aforge pipeline run --full bp-7e3a</text>
  <text x="742" y="282" font-family="'JetBrains Mono', monospace" font-size="13" fill="#5f5c53">  Pipeline: T1..T8 complete  Duration: 47ms</text>
  <text x="742" y="300" font-family="'JetBrains Mono', monospace" font-size="13" fill="#5f5c53">  Artifacts: 32 files  Integrity: BLAKE3 verified</text>
</svg>
