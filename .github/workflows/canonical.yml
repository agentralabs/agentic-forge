name: Canonical Sister Guardrails

on:
  push:
    paths:
      - 'scripts/**'
      - 'docs/**'
      - 'sister.manifest.json'
      - 'CLAUDE.md'
      - 'crates/*/Cargo.toml'
      - 'Cargo.toml'
  pull_request:
    paths:
      - 'scripts/**'
      - 'docs/**'
      - 'sister.manifest.json'
      - 'CLAUDE.md'
      - 'crates/*/Cargo.toml'
      - 'Cargo.toml'

jobs:
  canonical-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run canonical consistency checks
        run: bash scripts/check-canonical-consistency.sh
      - name: Run command surface checks
        run: bash scripts/check-command-surface.sh
      - name: Run MCP consolidation checks
        run: bash scripts/check-mcp-consolidation.sh
      - name: Run canonical sister checks
        run: bash scripts/check-canonical-sister.sh
